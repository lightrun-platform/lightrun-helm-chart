name: "Create Release Branch"

pr: none
trigger: none

variables:
  - group: lightrun-helm-chart-variables

schedules:
  - cron: 0 8 * * 3
    displayName: "Run every 2 weeks on Wednesday 11:00 Israel time"
    branches:
      include:
        - main
        - DEVOPS-3000   # temporary for testing
    always: true

pool:
  name: "Azure VMSS"

jobs:
  - job:
    steps:
      - checkout: self
        persistCredentials: true

      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.x'
          addToPath: true

      - script: |
          python -m pip install --upgrade pip
          pip install azure-devops
          python .pipelines/scripts/create_release_branch.py $(AZURE_DEVOPS_PAT_RO)
        displayName: 'Run schedule check'
       
